spring:
  application:
    name: coupon-service
  datasource:
    url: jdbc:postgresql://postgres:5432/coupon_db
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
  redis:
    host: redis
    port: 6379
  rabbitmq:
    host: rabbitmq
    port: 5672

server:
  port: 8083

eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka-server:8761/eureka/
