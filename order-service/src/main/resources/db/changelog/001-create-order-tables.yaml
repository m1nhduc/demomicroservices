databaseChangeLog:
  - changeSet:
      id: 1-create-orders-table
      author: coupon-system
      changes:
        - createTable:
            tableName: orders
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
              - column:
                  name: txn_id
                  type: varchar(128)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: user_id
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: product_type
                  type: varchar(16)
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: numeric(19,4)
                  constraints:
                    nullable: false
              - column:
                  name: market
                  type: varchar(32)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
        - createIndex:
            tableName: orders
            indexName: idx_orders_user
            columns:
              - column:
                  name: user_id
              - column:
                  name: created_at

  - changeSet:
      id: 2-create-outbox-table
      author: coupon-system
      changes:
        - createTable:
            tableName: outbox
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
              - column:
                  name: aggregate_type
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: aggregate_id
                  type: varchar(128)
                  constraints:
                    nullable: false
              - column:
                  name: event_type
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: payload
                  type: jsonb
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(16)
                  defaultValue: PENDING
                  constraints:
                    nullable: false
              - column:
                  name: retry_count
                  type: int
                  defaultValue: 0
              - column:
                  name: last_error
                  type: text
              - column:
                  name: last_attempted_at
                  type: timestamp
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
        - createIndex:
            tableName: outbox
            indexName: idx_outbox_status
            columns:
              - column:
                  name: status
              - column:
                  name: created_at
